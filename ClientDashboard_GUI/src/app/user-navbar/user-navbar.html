@if(accountService.currentUser()){
    
    <p-drawer header="Latest Notifications" [(visible)]="notificationVisibility" position="right">
        <app-notification-toggle [latestNotifications]="latestNotifications"></app-notification-toggle>
    </p-drawer>

    <div class="desktop-navbar">
        <p-menubar [model]="functionItems">
            <ng-template #end>
                <div class="flex align-items-center gap-2">
                    <p-menubar [model]="generalItems" [style]="{'border': 'none', 'background': 'transparent'}"></p-menubar>
                </div>
            </ng-template>
        </p-menubar>
    </div>

    <div class="mobile-navbar">
        <p-menubar [model]="mobileMenuItems"></p-menubar>
    </div>
}
